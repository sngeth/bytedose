<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍜 ANIME MODE 🍥 ByteDose</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Marker Felt', 'Chalkboard', cursive, sans-serif;
            line-height: 1.6;
            color: #000;
            background: #ff9900 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23ff9900" width="100" height="100"/><circle fill="%23ffaa00" cx="10" cy="10" r="3"/><circle fill="%23ffaa00" cx="50" cy="50" r="3"/><circle fill="%23ffaa00" cx="90" cy="90" r="3"/></svg>');
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .header-banner {
            background: linear-gradient(90deg, #ff6b35 0%, #f7931e 50%, #ff6b35 100%);
            border: 5px ridge #ffcc00;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(255,107,53,0.5); }
            to { box-shadow: 0 0 30px rgba(255,107,53,0.9); }
        }

        .header-title {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: rainbow 3s linear infinite;
        }

        @keyframes rainbow {
            0% { color: #ff0000; }
            16% { color: #ff9900; }
            32% { color: #ffff00; }
            48% { color: #00ff00; }
            64% { color: #0099ff; }
            80% { color: #9900ff; }
            100% { color: #ff0000; }
        }

        .header-subtitle {
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            font-style: italic;
        }

        .nav-bar {
            background: #000;
            border: 3px solid #ff6b35;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .nav-link {
            color: #ffff00;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px 15px;
            border: 2px dotted #ffff00;
            display: inline-block;
            margin: 5px;
            background: #333;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: #ff6b35;
            color: #fff;
            border-color: #fff;
            transform: scale(1.1);
        }

        .main-content {
            background: #fff;
            border: 5px double #ff6b35;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }

        .paper-title {
            font-size: 1.8rem;
            color: #ff6b35;
            text-align: center;
            margin-bottom: 20px;
            text-decoration: underline;
            text-decoration-color: #ffcc00;
            text-decoration-style: wavy;
        }

        .section-header {
            background: linear-gradient(90deg, #ff6b35, #ffcc00);
            color: #fff;
            padding: 10px 15px;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0 #000;
            border: 3px solid #000;
            margin: 25px 0 15px 0;
            display: inline-block;
            transform: skew(-5deg);
        }

        .section-header span {
            display: inline-block;
            transform: skew(5deg);
        }

        .explanation-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #000;
            margin-bottom: 20px;
            background: #fffacd;
            padding: 15px;
            border-left: 5px solid #ff6b35;
        }

        .naruto-quote {
            background: #ffeb3b;
            border: 4px dashed #ff6b35;
            padding: 20px;
            margin: 25px 0;
            font-style: italic;
            font-size: 1.2rem;
            text-align: center;
            position: relative;
        }

        .naruto-quote:before {
            content: "🍥";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            background: #fff;
            padding: 0 10px;
        }

        .loading {
            text-align: center;
            padding: 60px 24px;
            font-size: 1.5rem;
            color: #ff6b35;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .footer {
            background: #000;
            color: #ffff00;
            text-align: center;
            padding: 20px;
            border: 3px solid #ff6b35;
            margin-top: 20px;
        }

        .footer a {
            color: #ffff00;
            text-decoration: underline;
        }

        .blink {
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .scroll-text {
            background: #000;
            color: #00ff00;
            padding: 10px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            border: 2px solid #00ff00;
            overflow: hidden;
        }

        @media (max-width: 640px) {
            .header-title {
                font-size: 1.8rem;
            }

            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-banner">
            <div class="header-title">🍜 BYTEDOSE ANIME MODE 🍥</div>
            <div class="header-subtitle">Computer Science Research... BELIEVE IT!</div>
        </div>

        <div class="nav-bar">
            <a href="index.html" class="nav-link">← BACK TO NORMAL MODE</a>
            <a href="learn.html" class="nav-link">📚 SERIOUS MODE</a>
        </div>

        <div class="scroll-text">
            <marquee>🔥 WELCOME TO THE NARUTO JUTSU RESEARCH SCROLL! 🔥 UNDERSTANDING CS PAPERS THE NINJA WAY! 🔥</marquee>
        </div>

        <div id="content" class="main-content">
            <div class="loading">
                ⏳ Loading anime explanation... Believe it! 🍥
            </div>
        </div>

        <div class="footer">
            Made with 💛 by ByteDose | <span class="blink">⚡ POWERED BY CHAKRA ⚡</span>
        </div>
    </div>

    <script>
        async function generateAnimeExplanation() {
            try {
                const response = await fetch('latest-article.json');
                const data = await response.json();
                const article = data.article;

                // Check if we have a cached anime explanation
                let animeExplanation = null;
                try {
                    const animeRes = await fetch(`archive/${data.date}-anime.json`);
                    if (animeRes.ok) {
                        const animeData = await animeRes.json();
                        animeExplanation = animeData.explanation;
                    }
                } catch (err) {
                    console.log('No anime explanation cached, using fallback');
                }

                let explanationHTML = '';

                if (animeExplanation) {
                    // Use the LLM-generated explanation if available
                    explanationHTML = `
                        <div class="section-header"><span>🍥 THE PAPER, NARUTO STYLE 🍥</span></div>
                        <div class="explanation-text">${animeExplanation.replace(/\n\n/g, '</div><div class="explanation-text">')}</div>
                    `;
                } else {
                    // Fallback: Generic anime-themed explanation
                    explanationHTML = `
                        <div class="section-header"><span>🍥 THE MISSION 🍥</span></div>
                        <div class="explanation-text">
                            <strong>${article.title}</strong>
                        </div>

                        <div class="naruto-quote">
                            "A true ninja never gives up on understanding complex research papers!" - Naruto Uzumaki
                        </div>

                        <div class="section-header"><span>⚡ THE JUTSU (TECHNIQUE) ⚡</span></div>
                        <div class="explanation-text">
                            ${article.summary}
                        </div>

                        <div class="explanation-text">
                            Think of this research like training to become Hokage - it requires dedication, understanding of fundamental techniques (like Naruto mastering the Rasengan), and building on what came before. The authors are like sensei teaching us new jutsu to solve problems in computer science!
                        </div>
                    `;
                }

                document.getElementById('content').innerHTML = `
                    <div class="paper-title">${article.title}</div>
                    ${explanationHTML}
                    <div class="naruto-quote">
                        "The scroll of knowledge is endless! Never stop learning, dattebayo!" 📜
                    </div>
                `;
            } catch (err) {
                console.error('Error loading article:', err);
                document.getElementById('content').innerHTML = `
                    <div class="card">
                        <div class="loading" style="color: #666;">Unable to load article. Even Naruto fails sometimes! 😅</div>
                    </div>
                `;
            }
        }

        generateAnimeExplanation();
    </script>
</body>
</html>
