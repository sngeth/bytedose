<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteDose - Daily Computer Science Research</title>
    <meta name="description" content="Daily dose of cutting-edge computer science research from arXiv">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.65;
            color: #1a1a1a;
            background: #fff;
            padding: 0;
            margin: 0;
        }

        .nav {
            border-bottom: 1px solid #e5e5e5;
            padding: 20px 0;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: #000;
            letter-spacing: -0.02em;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-link {
            font-size: 0.875rem;
            color: #666;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #000;
        }

        .learn-link {
            font-size: 0.875rem;
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }

        .learn-link:hover {
            text-decoration: underline;
        }

        .meta-badge {
            font-size: 0.75rem;
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e5e5e5;
        }

        .date {
            font-size: 0.8125rem;
            color: #999;
            font-weight: 500;
        }

        .divider {
            color: #ddd;
        }

        .journal {
            font-size: 0.8125rem;
            color: #666;
            font-weight: 500;
        }

        h1 {
            font-size: 2.25rem;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            color: #000;
        }

        .authors {
            font-size: 0.9375rem;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .content-section {
            margin: 32px 0;
        }

        .content-section h2 {
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #999;
            margin-bottom: 12px;
        }

        .summary-text {
            font-size: 1.0625rem;
            line-height: 1.7;
            color: #1a1a1a;
        }

        .read-paper {
            display: inline-block;
            padding: 14px 28px;
            background: transparent;
            border: 2px solid #000;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9375rem;
            letter-spacing: -0.01em;
            transition: all 0.2s;
            margin-right: 12px;
        }

        .read-paper:hover {
            background: #000;
            color: #fff;
        }

        .learn-button {
            display: inline-block;
            padding: 14px 28px;
            background: #0066cc;
            border: 2px solid #0066cc;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9375rem;
            letter-spacing: -0.01em;
            transition: all 0.2s;
        }

        .learn-button:hover {
            background: #0052a3;
            border-color: #0052a3;
        }

        .categories {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e5e5e5;
        }

        .category-tag {
            display: inline-block;
            padding: 4px 10px;
            background: #f5f5f5;
            color: #666;
            font-size: 0.75rem;
            margin-right: 8px;
            margin-bottom: 8px;
            border-radius: 3px;
        }

        footer {
            text-align: center;
            padding: 48px 24px;
            border-top: 1px solid #e5e5e5;
            margin-top: 64px;
        }

        footer p {
            font-size: 0.8125rem;
            color: #999;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 60px 24px;
            color: #999;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.75rem;
            }

            .container {
                padding: 40px 20px 80px;
            }

            .article-meta {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <a href="index.html" class="logo">ByteDose</a>
            <div class="nav-links">
                <a href="learn.html" class="learn-link">Learn</a>
                <a href="archive.html" class="nav-link">Archive</a>
                <div class="meta-badge">arXiv</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="article-content" class="loading">
            Loading today's article...
        </div>
    </div>

    <footer>
        <p>All articles sourced from arXiv preprint repository</p>
        <p style="margin-top: 8px; font-size: 0.75rem;">Computer Science · Updated Daily</p>
    </footer>

    <script>
        async function loadArticle() {
            try {
                const response = await fetch('latest-article.json');
                const data = await response.json();
                const article = data.article;

                const publishedDate = new Date(article.published);
                const formattedDate = publishedDate.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                let categoriesHTML = '';
                if (article.categories && article.categories.length > 0) {
                    categoriesHTML = `
                        <div class="categories">
                            ${article.categories.map(cat => `<span class="category-tag">${cat}</span>`).join('')}
                        </div>
                    `;
                }

                document.getElementById('article-content').innerHTML = `
                    <div class="article-meta">
                        <span class="date">${formattedDate}</span>
                        <span class="divider">·</span>
                        <span class="journal">arXiv preprint</span>
                    </div>

                    <h1>${article.title}</h1>

                    <p class="authors">${article.authors}</p>

                    <div class="content-section">
                        <h2>Abstract</h2>
                        <p class="summary-text">${article.summary}</p>
                    </div>

                    ${categoriesHTML}

                    <div style="margin-top: 40px;">
                        <a href="learn.html" class="learn-button">
                            Learn the Concepts
                        </a>
                        <a href="${article.url}" target="_blank" rel="noopener" class="read-paper">
                            Read Full Paper →
                        </a>
                    </div>
                `;
            } catch (err) {
                console.error('Error loading article:', err);
                document.getElementById('article-content').innerHTML = `
                    <div class="loading">Unable to load article. Please refresh the page.</div>
                `;
            }
        }

        loadArticle();
    </script>
</body>
</html>
